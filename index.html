<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Todo</title>
</head>
<body>
    <div class="card">
        <header>
            <h1>TaskFlow</h1>
            <p>Organize your day, one task at a time.</p>
        </header>
        <main>
            <section id="add-task">
                <form>
                <input type="text" class="add-input" id="add-task-input" placeholder="Add a new task..." required>
                <button type="submit" id="add-btn">+</button>
                </form>
            </section>
            
        </main>
    </div>
</body>
</html>
